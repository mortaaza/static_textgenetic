<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 100" role="img" aria-label="TextGenetic AI Inc.">
  <defs>
    <linearGradient id="lg" x1="12" y1="14" x2="52" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7fe3f7"/>
      <stop offset="1" stop-color="#4f9bff"/>
    </linearGradient>
  </defs>

  <!-- monogram tile -->
  <g transform="translate(8 18)">
    <rect width="64" height="64" rx="15" fill="#0b1e57"/>
    <g stroke="#37c2e6" stroke-width="1.4" opacity=".5" stroke-linecap="round">
      <line x1="36" y1="18" x2="50" y2="24"/><line x1="24" y1="46" x2="43" y2="34"/>
    </g>
    <g fill="none" stroke="url(#lg)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 18 H36"/><path d="M24 18 V46"/>
      <path d="M50 24 A11 11 0 1 0 50 40"/><path d="M50 34 H43"/>
    </g>
    <g fill="#ffffff">
      <circle cx="12" cy="18" r="3"/><circle cx="36" cy="18" r="3"/><circle cx="24" cy="46" r="3"/>
      <circle cx="50" cy="24" r="3"/><circle cx="50" cy="40" r="3"/>
    </g>
    <circle cx="43" cy="34" r="3" fill="#7fe3f7"/>
  </g>

  <!-- wordmark -->
  <text x="92" y="52" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-weight="800" font-size="34" letter-spacing="-1">
    <tspan fill="#0b1e57">Text</tspan><tspan fill="#1e63ff">Genetic</tspan>
  </text>
  <text x="94" y="74" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-weight="700" font-size="11.5" letter-spacing="3.4" fill="#1e63ff">AI · NEUROANALYTICS</text>
</svg>
